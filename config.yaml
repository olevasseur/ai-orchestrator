# Orchestrator configuration.
# Secrets (API keys) must go in .env, not here.

# Planner settings
openai_model: gpt-4o

# Executor settings
executor_mode: cli            # cli | demo
executor_provider: codex      # claude | codex
                              # codex is EXPERIMENTAL. It runs:
                              #   codex exec --json --skip-git-repo-check \
                              #              --dangerously-bypass-approvals-and-sandbox <prompt>
                              # The --dangerously-bypass-approvals-and-sandbox flag disables
                              # Codex's approval prompts AND its filesystem/network sandbox.
                              # Only enable codex inside a disposable, externally-sandboxed
                              # repo (VM, container, throwaway clone). Do NOT point it at
                              # repos with secrets, production credentials, or shared state.
                              # See README.md "Executor providers (Codex experimental)".
claude_cli_path: claude       # path to the `claude` binary
codex_cli_path: codex         # path to the `codex` binary (used when executor_provider: codex)

# Executor workspace isolation (generic across providers).
# Some providers (notably Codex) run with reduced approval/sandbox guardrails,
# which means they can execute arbitrary shell commands without per-action
# approval. To make this safe, the orchestrator can stage each executor run
# inside a disposable git worktree, capture the resulting unified diff as an
# artifact, and leave the source repo untouched until a human explicitly
# applies the patch with
# `git -C <repo> apply <iterations/<n>/codex_workspace.diff>`.
#
#   executor_workspace_strategy:
#     worktree - RECOMMENDED for unsandboxed providers. Create a detached
#                worktree under executor_worktree_base_dir from the source
#                repo's HEAD, run the executor there, persist the diff, then
#                dispose of the worktree. The source repo is never written to.
#     inplace  - Legacy/experimental: run the executor directly in the target
#                repo. Only use this when the target repo is itself disposable
#                (VM, container, throwaway clone) and contains no secrets.
#   executor_worktree_base_dir:
#     A dedicated temp location for executor worktrees. MUST NOT point at the
#     real repo, ~/.orchestrator/runs, or any other artifact directory.
#     Default: /tmp/ai-orchestrator-executor-worktrees
#   executor_apply_policy (only relevant when strategy == worktree):
#     manual  - DEFAULT. Diff is saved as an artifact for human review/apply.
#               Worktree is cleaned up after the diff is captured.
#     discard - Same cleanup as manual, semantically signals "do not apply".
#     auto    - NOT IMPLEMENTED. Will raise NotImplementedError.
#
# Backward compatibility: the legacy keys `codex_workspace_strategy`,
# `codex_worktree_base_dir`, and `codex_apply_policy` are still honored.
# If both forms are present, the generic `executor_*` form wins.
executor_workspace_strategy: worktree
executor_worktree_base_dir: /tmp/ai-orchestrator-executor-worktrees
executor_apply_policy: manual

# Equivalent nested form (either form works; flat keys above take precedence):
# executor:
#   mode: cli
#   provider: claude
#   claude:
#     command: claude
#   codex:
#     command: codex

# Storage
log_dir: ~/.orchestrator/runs

# Timeouts (seconds)
executor_timeout: 600         # 10 minutes
validation_timeout: 120       # 2 minutes

# Memory
memory_refresh_interval: 5    # auto-refresh working_memory every N iterations

# Safety: commands starting with these prefixes are auto-approved
command_allowlist:
  - pytest
  - python
  - python3
  - npm
  - npx
  - cargo
  - go test
  - make
  - git status
  - git diff
  - git log
  - echo
  - test        # shell builtin: test "$(cmd)" = "expected"
  - "["         # shell builtin: [ "$x" = "y" ]
  - sh
  - bash

# Safety: commands containing these strings are always denied
command_denylist:
  - "rm -rf /"
  - sudo
  - "> /dev/sda"
  - "dd if="
