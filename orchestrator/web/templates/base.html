<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e293b">
  <title>{% block title %}Orchestrator{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Prevent iOS zoom on input focus */
    input, textarea, select { font-size: 16px !important; }
    /* Smooth scroll position restore after meta-refresh */
    html { scroll-behavior: auto; }
    /* Terminal-style log output */
    .log-output {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #94a3b8; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    /* Copy button */
    .copy-btn {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      border: 1px solid #475569; color: #94a3b8; background: transparent;
      cursor: pointer; line-height: 1.6; touch-action: manipulation;
      min-height: 28px; min-width: 52px;
    }
    .copy-btn:hover { border-color: #94a3b8; color: #e2e8f0; }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }
  </style>
  <script>
    function copyText(text, btn) {
      const reset = () => { btn.textContent = 'Copy'; btn.classList.remove('copied'); };
      const ok = () => { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(reset, 1600); };
      // navigator.clipboard requires HTTPS or localhost (window.isSecureContext).
      // Over plain HTTP (e.g. Tailscale without TLS) it is unavailable or will reject.
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(ok).catch(() => execFallback(text, ok));
      } else {
        execFallback(text, ok);
      }
    }
    function execFallback(text, ok) {
      // textarea must be off-screen but rendered (not display:none / opacity:0)
      // so iOS will allow the selection to be copied.
      const el = document.createElement('textarea');
      el.value = text;
      el.setAttribute('readonly', '');
      el.style.cssText = 'position:absolute;left:-9999px;top:' + (window.scrollY || 0) + 'px';
      document.body.appendChild(el);
      el.focus();
      el.select();
      el.setSelectionRange(0, el.value.length);   // required on iOS
      let copied = false;
      try { copied = document.execCommand('copy'); } catch(_) {}
      document.body.removeChild(el);
      if (copied) {
        ok();
      } else {
        // Both methods failed (HTTP + mobile restrictions). Show a prompt so the
        // user can copy manually — works on every browser without HTTPS.
        window.prompt('Copy:', text);
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <!-- Header bar -->
  <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <a href="/" class="text-slate-100 font-bold tracking-tight">
      ⚙ Orchestrator
    </a>
    {% if session.run_id %}
    <div class="text-xs text-slate-400 font-mono truncate max-w-[60%] text-right">
      {{ session.run_id }}
    </div>
    {% endif %}
  </div>

  <!-- Page content -->
  <div class="max-w-2xl mx-auto px-4 py-6 pb-24">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
